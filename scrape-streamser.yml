name: Scrape Twitch Top Streamers

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC daily (1 hour after subscriber scrape to avoid overlap)
  workflow_dispatch:        # allow manual runs

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r scraper/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run scraper
        run: python scraper/scrape_streamers.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/top-streamers.json
          git diff --cached --quiet || git commit -m "chore: update top streamers data"
          git push
